# NovaCentral reverse proxy — copy to nginx sites-available / include from nginx.conf.
# TLS: replace certificate paths after certbot / your CA; keep HTTPS server as default.
#
# PM2 cluster (nova-api): Node listens on ONE port; nginx balances/fails over that upstream.
# Fork mode (three ports): replace upstream with three server lines on 5000–5002.

upstream backend_servers {
    # Round-robin across members (default). Single member when PM2 cluster binds :5000.
    least_conn;
    server 127.0.0.1:5000 max_fails=3 fail_timeout=10s;
    # Fork-mode alternative (comment single server above, uncomment below):
    # server 127.0.0.1:5001 max_fails=3 fail_timeout=10s;
    # server 127.0.0.1:5002 max_fails=3 fail_timeout=10s;
}

# Rate zone for auth (login/register) — adjust zone memory if needed.
limit_req_zone $binary_remote_addr zone=nova_auth_login:10m rate=10r/s;
limit_req_status 429;

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Redirect HTTP → HTTPS once certificates exist (optional).
    # return 301 https://$host$request_uri;

    location /api/health {
        access_log off;
        proxy_pass http://backend_servers;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 2s;
        proxy_read_timeout    5s;
        proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
    }

    location / {
        proxy_pass http://backend_servers;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    86400;

        proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 2;

        proxy_buffering off;
    }

    # Stricter nginx rate limit on login/register (belt-and-suspenders with Express limits).
    location ~ ^/api/auth/(login|register)$ {
        limit_req zone=nova_auth_login burst=30 nodelay;
        proxy_pass http://backend_servers;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

